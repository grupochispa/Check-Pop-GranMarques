<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gran Marqués - MarquesCheck PWA</title>
    
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 600: '#0284c7', 
                            700: '#0369a1', 800: '#075985', 900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Checkboxes tipo 'Chip' optimizados para pulgar */
        .pop-chip input[type="checkbox"] { display: none; }
        .pop-chip label {
            display: inline-flex; align-items: center; cursor: pointer; transition: all 0.2s ease;
        }
        .pop-chip input[type="checkbox"]:checked + label {
            background-color: #0284c7; color: white; border-color: #0284c7;
            box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.3);
        }

        #foto-preview-container img { max-height: 200px; width: auto; border-radius: 0.75rem; }
        
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            border-top: 2px solid white; width: 16px; height: 16px;
            animation: spin 1s linear infinite; display: none; margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body.loading .spinner { display: inline-block; }
        body.loading #btnText { display: none; }
        
        /* Ocultar scrollbar en la lista de autocompletado */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-brand-50 text-brand-900 font-sans antialiased min-h-screen pb-10">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <nav class="max-w-lg mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-7 h-7 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="text-xl font-extrabold tracking-tighter text-brand-900">
                    GranMarques<span class="text-brand-600"> Check</span>
                </span>
            </div>
            <div class="text-xs font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                GRAN MARQUÉS
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="max-w-lg mx-auto p-4">
        
        <div class="mb-6">
            <h1 class="text-2xl font-extrabold tracking-tight">Registro de Visita</h1>
            <p class="text-gray-600 text-sm mt-1">Complete los detalles y adjunte evidencia.</p>
        </div>

        <form id="popForm" class="space-y-5">
            
            <!-- Card de Datos Generales -->
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <h2 class="text-xs font-bold text-brand-700 uppercase tracking-wider mb-2">Datos Generales</h2>
                
                <!-- Autocompletado de Promotor -->
                <div class="relative">
                    <label for="promotor" class="block text-sm font-semibold text-gray-700 mb-1.5">Promotor / Vendedor</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <input type="text" id="promotor" name="promotor" required placeholder="Escribe para buscar o añadir..." autocomplete="off"
                            class="w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-100 focus:border-brand-600 transition duration-150 text-base">
                    </div>
                    <!-- Lista de sugerencias (oculta por defecto) -->
                    <ul id="sugerencias-promotor" class="absolute z-10 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg max-h-48 overflow-y-auto hidden no-scrollbar divide-y divide-gray-100">
                        <!-- Las sugerencias se insertan aquí vía JS -->
                    </ul>
                </div>

                <div>
                    <label for="cliente" class="block text-sm font-semibold text-gray-700 mb-1.5">Cliente / Establecimiento</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                        </div>
                        <input type="text" id="cliente" name="cliente" required placeholder="Nombre del local"
                            class="w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-100 focus:border-brand-600 transition duration-150 text-base">
                    </div>
                </div>

                <div>
                    <label for="estado" class="block text-sm font-semibold text-gray-700 mb-1.5">Estado</label>
                    <div class="relative">
                        <select id="estado" name="estado" required
                            class="w-full pl-4 pr-10 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-100 focus:border-brand-600 transition duration-150 appearance-none bg-white text-base">
                            <option value="" disabled selected>Seleccione un estado</option>
                            <option value="Amazonas">Amazonas</option><option value="Anzoátegui">Anzoátegui</option><option value="Apure">Apure</option>
                            <option value="Aragua">Aragua</option><option value="Barinas">Barinas</option><option value="Bolívar">Bolívar</option>
                            <option value="Carabobo">Carabobo</option><option value="Cojedes">Cojedes</option><option value="Delta Amacuro">Delta Amacuro</option>
                            <option value="Distrito Capital">Distrito Capital</option><option value="Falcón">Falcón</option><option value="Guárico">Guárico</option>
                            <option value="Lara">Lara</option><option value="La Guaira">La Guaira (Vargas)</option><option value="Mérida">Mérida</option>
                            <option value="Miranda">Miranda</option><option value="Monagas">Monagas</option><option value="Nueva Esparta">Nueva Esparta</option>
                            <option value="Portuguesa">Portuguesa</option><option value="Sucre">Sucre</option><option value="Táchira">Táchira</option>
                            <option value="Trujillo">Trujillo</option><option value="Yaracuy">Yaracuy</option><option value="Zulia">Zulia</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Card de Materiales -->
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xs font-bold text-brand-700 uppercase tracking-wider mb-3">Material POP</h2>
                <div class="flex flex-wrap gap-2 pop-chip">
                    <div>
                        <input type="checkbox" id="mat_cenefa" value="CENEFA" class="mat-check">
                        <label for="mat_cenefa" class="px-4 py-2 border border-gray-200 rounded-full text-sm font-medium hover:bg-brand-50">CENEFA</label>
                    </div>
                    <div>
                        <input type="checkbox" id="mat_hablador" value="HABLADOR" class="mat-check">
                        <label for="mat_hablador" class="px-4 py-2 border border-gray-200 rounded-full text-sm font-medium hover:bg-brand-50">HABLADOR</label>
                    </div>
                    <div>
                        <input type="checkbox" id="mat_afiche" value="AFICHE" class="mat-check">
                        <label for="mat_afiche" class="px-4 py-2 border border-gray-200 rounded-full text-sm font-medium hover:bg-brand-50">AFICHE</label>
                    </div>
                    <div>
                        <input type="checkbox" id="mat_dangler" value="DANGLER" class="mat-check">
                        <label for="mat_dangler" class="px-4 py-2 border border-gray-200 rounded-full text-sm font-medium hover:bg-brand-50">DANGLER</label>
                    </div>
                    <div>
                        <input type="checkbox" id="mat_rompe" value="ROMPE TRAFICO" class="mat-check">
                        <label for="mat_rompe" class="px-4 py-2 border border-gray-200 rounded-full text-sm font-medium hover:bg-brand-50">ROMPE TRAFICO</label>
                    </div>
                </div>
            </section>

            <!-- Card de Evidencia Fotográfica -->
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xs font-bold text-brand-700 uppercase tracking-wider mb-3">Evidencia Fotográfica</h2>
                <div class="space-y-4">
                    <button type="button" onclick="document.getElementById('foto').click()" 
                        class="w-full flex items-center justify-center gap-2.5 px-4 py-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-600 hover:border-brand-400 hover:bg-brand-50 transition active:bg-brand-100">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span class="font-semibold">Tomar Foto</span>
                    </button>

                    <input type="file" id="foto" name="foto" accept="image/*" capture="environment" class="hidden">

                    <div id="foto-preview-container" class="hidden flex flex-col items-center justify-center p-2 border border-gray-100 rounded-2xl bg-gray-50 relative">
                        <img id="foto-preview-img" src="#" alt="Previsualización" class="object-cover shadow-sm w-full">
                        <p id="foto-filename" class="text-xs text-gray-500 mt-2 truncate max-w-full px-2"></p>
                    </div>
                </div>
            </section>

            <!-- Botón de Envío -->
            <div class="pt-2 sticky bottom-4 z-40">
                <button type="submit" id="btnSubmit" 
                    class="w-full flex items-center justify-center bg-brand-600 hover:bg-brand-700 text-white py-4 rounded-xl font-bold text-lg shadow-xl shadow-brand-200 transition duration-150 active:scale-[0.98]">
                    <div class="spinner" id="loadingSpinner"></div>
                    <span id="btnText">Enviar Registro</span>
                    <span id="btnTextLoading" class="hidden">Subiendo datos...</span>
                </button>
            </div>
        </form>
    </main>

    <!-- Notificaciones Toast -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] transform -translate-y-20 opacity-0 transition-all duration-300 ease-out w-11/12 max-w-sm">
        <div class="flex items-center gap-3 bg-gray-900 text-white px-5 py-4 rounded-xl shadow-2xl">
            <div id="toastIconSuccess" class="hidden text-green-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <div id="toastIconError" class="hidden text-red-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18"></path></svg>
            </div>
            <p id="toastMessage" class="font-medium text-sm leading-snug"></p>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN SUPABASE ---
        const SUPABASE_URL = 'https://zgbsrbjtjnozpzxifpua.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnYnNyYmp0am5venB6eGlmcHVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQzNjI5MjUsImV4cCI6MjA2OTkzODkyNX0.zHVKe6Ab73PFhQqD3Au94x1Z71hMyRpxE1PCWP8-QTI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- ELEMENTOS DEL DOM ---
        const form = document.getElementById('popForm');
        const inputPromotor = document.getElementById('promotor');
        const listaSugerencias = document.getElementById('sugerencias-promotor');
        const fileInput = document.getElementById('foto');
        const previewContainer = document.getElementById('foto-preview-container');
        const previewImg = document.getElementById('foto-preview-img');
        const filenameLabel = document.getElementById('foto-filename');
        const btnSubmit = document.getElementById('btnSubmit');

        // --- LÓGICA DE AUTOCOMPLETADO (PROMOTOR) ---
        let debounceTimer;
        
        inputPromotor.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const query = e.target.value.trim();
            
            if (query.length < 2) {
                listaSugerencias.classList.add('hidden');
                return;
            }

            // Esperar 300ms después de que el usuario deje de escribir para consultar a Supabase
            debounceTimer = setTimeout(async () => {
                const { data, error } = await supabase
                    .from('sorteo_promotores')
                    .select('nombre')
                    .ilike('nombre', `%${query}%`)
                    .limit(5);

                if (!error && data && data.length > 0) {
                    listaSugerencias.innerHTML = '';
                    data.forEach(promotor => {
                        const li = document.createElement('li');
                        li.textContent = promotor.nombre;
                        // Estilos táctiles (mobile first)
                        li.className = 'px-4 py-3 cursor-pointer hover:bg-brand-50 active:bg-brand-100 text-gray-700 text-base';
                        li.addEventListener('click', () => {
                            inputPromotor.value = promotor.nombre;
                            listaSugerencias.classList.add('hidden');
                        });
                        listaSugerencias.appendChild(li);
                    });
                    listaSugerencias.classList.remove('hidden');
                } else {
                    listaSugerencias.classList.add('hidden');
                }
            }, 300);
        });

        // Ocultar lista al hacer click afuera
        document.addEventListener('click', (e) => {
            if (e.target !== inputPromotor && e.target !== listaSugerencias) {
                listaSugerencias.classList.add('hidden');
            }
        });

        // --- PREVISUALIZACIÓN DE FOTO ---
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                filenameLabel.textContent = file.name;
                reader.onload = function(event) {
                    previewImg.setAttribute('src', event.target.result);
                    previewContainer.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            } else {
                previewContainer.classList.add('hidden');
            }
        });

        // --- ENVÍO DEL FORMULARIO ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoading(true);

            try {
                const file = fileInput.files[0];
                if (!file) throw new Error('Por favor, tome una foto de evidencia.');

                // 1. Verificar y guardar al promotor si no existe
                const promotorNombre = inputPromotor.value.trim().toUpperCase(); // Guardar en mayúsculas para mejor consistencia
                
                // Usamos 'upsert' que inserta si no existe, o ignora si ya está (basado en la restricción UNIQUE)
                await supabase
                    .from('sorteo_promotores')
                    .upsert([{ nombre: promotorNombre }], { onConflict: 'nombre' });

                // 2. Subir imagen
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_evidencia.${fileExt}`;
                
                const { data: storageData, error: storageError } = await supabase.storage
                    .from('evidencias')
                    .upload(fileName, file);

                if (storageError) throw new Error('Error al subir la foto.');
                const fotoPath = storageData.path; 

                // 3. Recopilar resto de datos
                const cliente = document.getElementById('cliente').value;
                const estado = document.getElementById('estado').value;
                const materiales = Array.from(document.querySelectorAll('.mat-check:checked')).map(cb => cb.value);

                if (materiales.length === 0) throw new Error('Seleccione al menos un material POP.');
                if (!estado) throw new Error('Debe seleccionar un estado.');

                // 4. Insertar registro principal
                const { error: dbError } = await supabase
                    .from('sorteo_registros')
                    .insert([{
                        promotor_nombre: promotorNombre,
                        cliente_nombre: cliente,
                        estado: estado,
                        materiales_entregados: materiales,
                        foto_url: fotoPath 
                    }]);

                if (dbError) throw new Error('Error al guardar el registro.');

                showToast('Visita registrada con éxito', 'success');
                form.reset();
                previewContainer.classList.add('hidden');

            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        // --- FUNCIONES AUXILIARES ---
        function setLoading(isLoading) {
            if (isLoading) {
                document.body.classList.add('loading');
                btnSubmit.disabled = true;
                btnSubmit.classList.add('opacity-80', 'cursor-not-allowed');
                document.getElementById('btnText').classList.add('hidden');
                document.getElementById('btnTextLoading').classList.remove('hidden');
            } else {
                document.body.classList.remove('loading');
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-80', 'cursor-not-allowed');
                document.getElementById('btnText').classList.remove('hidden');
                document.getElementById('btnTextLoading').classList.add('hidden');
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            msgEl.textContent = message;
            
            document.getElementById('toastIconSuccess').classList.toggle('hidden', type !== 'success');
            document.getElementById('toastIconError').classList.toggle('hidden', type !== 'error');

            toast.classList.remove('-translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('-translate-y-20', 'opacity-0');
            }, 3500);
        }
    </script>
</body>
</html>
